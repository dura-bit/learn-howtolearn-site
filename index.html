        "@type":"Question",

        "acceptedAnswer":{
          "@type":"Answer",

        }
      },
      {
        "@type":"Question",
        "name":"國考需要準備多久？",
        "acceptedAnswer":{
          "@type":"Answer",

        }
      },

        "@type":"Question",

        }
      }
    ]
